# Publish the multi-arch image to GHCR via the shared rknightion container-publish
# reusable (native amd64+arm64 matrix, cosign signing, provenance, SBOM, Trivy).
# Called by release-please.yml when a release is created (release_tag set). Also
# workflow_dispatch-able: leave release_tag empty for an edge (:main) test build,
# or set it to re-publish a tag.
name: publish

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to publish, e.g. v1.2.3"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (vX.Y.Z) to publish; empty = edge (:main) test build"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  image:
    permissions:
      contents: write        # SBOMs attached to the release (when release_tag set)
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: rknightion/.github/.github/workflows/container-publish.yml@main
    with:
      release-tag: ${{ inputs.release_tag }}
