name: CodeQL
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '51 3 * * 4'
permissions: {}
jobs:
  codeql:
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    uses: rknightion/.github/.github/workflows/codeql.yml@8629ccbdd3dc4eed776ca42e1896ab37f94d88d6 # main
    with:
      languages: '[{"language":"python","build-mode":"none"},{"language":"actions","build-mode":"none"}]'
